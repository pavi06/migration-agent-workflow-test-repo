name: ASP.NET Core CI with Extra Step

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_CONFIGURATION: 'Release'
  BUILD_PLATFORM: 'any cpu'

jobs:
  build:
    uses: ./.github/workflows/templates/aspnet-core-ci.tpl
    with:
      dotnet-version: '8.0.x'
      build-configuration: 'Release'
      project-pattern: '**/*.csproj'
      test-project-pattern: '**/*Tests/*.csproj'
      artifact-name: 'drop'
      publish-path: './publish'

  extra-steps:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Extra Step - Custom Script
      run: |
        echo "This is an extra step added to the ASP.NET pipeline"
        echo "Current directory: $(pwd)"
        echo "Build configuration: ${{ env.BUILD_CONFIGURATION }}"
        ls -la